<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌸 子晴的極致健康進化 🌸</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background: #fff5f7; color: #4a4a4a; margin: 0; }
        .candy-card { background: white; border-radius: 28px; padding: 20px; border: 2px solid #fff0f3; transition: 0.3s; }
        .pink-gradient { background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%); }
        .page { display: none; padding-bottom: 120px; animation: fadeIn 0.4s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .nav-active { color: #ff4d6d !important; background: #fff0f3; border-radius: 20px; }
        input, select { background: #fdf2f4; border-radius: 16px; padding: 14px; border: none; outline: none; width: 100%; }
        .autocomplete-items { position: absolute; background: white; border-radius: 12px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); width: 100%; z-index: 99; max-height: 200px; overflow-y: auto; }
        .autocomplete-item { padding: 10px; cursor: pointer; border-bottom: 1px solid #eee; }
        .autocomplete-item:hover { background: #fff0f3; }
    </style>
</head>
<body class="max-w-md mx-auto">

    <header class="p-8 text-center">
        <p id="todayDisplay" class="text-pink-400 font-bold tracking-widest mb-1"></p>
        <h1 id="headerTitle" class="text-2xl font-black text-slate-700">🍬 今日總覽</h1>
    </header>

    <div id="page-home" class="page active px-6 space-y-5">
        <div class="candy-card pink-gradient text-white shadow-xl relative overflow-hidden">
            <div class="relative z-10">
                <p class="text-sm opacity-90 font-medium">✨ 目前 BMI 狀態</p>
                <div class="flex items-baseline gap-2">
                    <h2 id="dashBMI" class="text-6xl font-black">--</h2>
                    <span id="bmiStatus" class="text-sm bg-white/30 px-3 py-1 rounded-full">輸入體重中...</span>
                </div>
            </div>
            <i class="fas fa-heart absolute -right-4 -bottom-4 text-white/20 text-9xl"></i>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <div class="candy-card flex flex-col items-center justify-center border-blue-100">
                <div class="bg-blue-50 w-12 h-12 rounded-2xl flex items-center justify-center mb-2">
                    <i class="fas fa-droplet text-blue-400 text-xl"></i>
                </div>
                <p class="text-xs text-gray-400">飲水進度</p>
                <p class="text-lg font-black text-blue-500"><span id="dashWater">0</span> / 8 杯</p>
            </div>
            <div class="candy-card flex flex-col items-center justify-center border-orange-100">
                <div class="bg-orange-50 w-12 h-12 rounded-2xl flex items-center justify-center mb-2">
                    <i class="fas fa-fire text-orange-400 text-xl"></i>
                </div>
                <p class="text-xs text-gray-400">運動消耗</p>
                <p class="text-lg font-black text-orange-500"><span id="dashExer">0</span> kcal</p>
            </div>
            <div class="candy-card flex flex-col items-center justify-center border-purple-100">
                <div class="bg-purple-50 w-12 h-12 rounded-2xl flex items-center justify-center mb-2">
                    <i class="fas fa-moon text-purple-400 text-xl"></i>
                </div>
                <p class="text-xs text-gray-400">睡眠時數</p>
                <p class="text-lg font-black text-purple-500"><span id="dashSleep">0</span> hr</p>
            </div>
            <div class="candy-card flex flex-col items-center justify-center border-pink-100">
                <div class="bg-pink-50 w-12 h-12 rounded-2xl flex items-center justify-center mb-2">
                    <i class="fas fa-utensils text-pink-400 text-xl"></i>
                </div>
                <p class="text-xs text-gray-400">今日攝取</p>
                <p class="text-lg font-black text-pink-500"><span id="dashFood">0</span> kcal</p>
            </div>
        </div>
    </div>

    <div id="page-weight" class="page px-6 space-y-4">
        <div class="candy-card">
            <h3 class="font-black text-lg mb-4 text-pink-500">秤秤看今天多重？</h3>
            <div class="flex gap-3">
                <input type="number" id="wInput" step="0.1" placeholder="輸入 kg">
                <button onclick="updateWeight()" class="pink-gradient px-6 text-white rounded-2xl font-bold whitespace-nowrap">存入</button>
            </div>
        </div>
        <div class="candy-card">
            <canvas id="wChart"></canvas>
        </div>
    </div>

    <div id="page-exer" class="page px-6 space-y-4">
        <div class="candy-card space-y-4">
            <h3 class="font-black text-lg text-orange-500">動起來！🏃‍♀️</h3>
            <select id="exType">
                <option value="4">🚶 快走 (輕度)</option>
                <option value="8">🏃 慢跑 (中強度)</option>
                <option value="6">💃 居家跟練影片 (重點推!)</option>
                <option value="3">🧘 瑜珈伸展</option>
                <option value="10">🏋️ 重訓/HIIT</option>
            </select>
            <div class="flex items-center gap-3 bg-gray-50 p-3 rounded-2xl">
                <input type="number" id="exTime" value="40" class="bg-transparent text-center font-bold text-xl">
                <span class="font-bold text-gray-500">分鐘</span>
            </div>
            <button onclick="addExer()" class="w-full pink-gradient text-white py-4 rounded-2xl font-black shadow-lg shadow-pink-100">新增運動</button>
        </div>
    </div>

    <div id="page-water" class="page px-6">
        <div class="candy-card text-center py-8 space-y-6">
            <div onclick="modifyWater(1)" class="mx-auto w-32 h-32 bg-blue-50 rounded-full flex items-center justify-center cursor-pointer hover:scale-105 active:scale-95 transition">
                <i class="fas fa-droplet text-5xl text-blue-400"></i>
            </div>
            <h2 class="text-3xl font-black text-slate-700">今日喝了 <span id="waterText" class="text-blue-500">0</span> 杯</h2>
            <div class="grid grid-cols-4 gap-4" id="waterGrid"></div>
            <button onclick="modifyWater(-1)" class="text-xs text-gray-400 underline">點太快？扣掉一杯</button>
        </div>
    </div>

    <div id="page-diet" class="page px-6 space-y-4">
        <div class="candy-card space-y-4 relative">
            <h3 class="font-black text-lg text-pink-500">吃了什麼好吃的？</h3>
            <div class="relative">
                <input type="text" id="foodInput" placeholder="輸入關鍵字 (如: 雞肉、蛋、便當)" oninput="searchFood()">
                <div id="autocompleteList" class="autocomplete-items"></div>
            </div>
            <div class="bg-pink-50 p-4 rounded-2xl">
                <p class="text-xs text-pink-400 mb-1">估計熱量 (可手動調整)</p>
                <input type="number" id="foodCal" placeholder="kcal" class="bg-white text-2xl font-black">
            </div>
            <button onclick="addFood()" class="w-full pink-gradient text-white py-4 rounded-2xl font-black shadow-lg">新增紀錄</button>
        </div>
        <div class="candy-card" id="foodLogContainer">
            <div id="foodLogs" class="space-y-3"></div>
        </div>
    </div>

    <div id="page-sleep" class="page px-6 space-y-4">
        <div class="candy-card text-center space-y-6">
            <div class="bg-purple-50 w-24 h-24 rounded-full flex items-center justify-center mx-auto">
                <i class="fas fa-bed text-4xl text-purple-400"></i>
            </div>
            <h3 class="font-black text-lg">昨晚睡了幾小時？</h3>
            <input type="range" id="sleepRange" min="0" max="14" step="0.5" class="accent-purple-400">
            <div class="text-4xl font-black text-purple-600"><span id="sleepVal">7.5</span> hr</div>
            <button onclick="saveSleep()" class="w-full bg-purple-500 text-white py-4 rounded-2xl font-black">儲存睡眠紀錄</button>
        </div>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 bg-white/80 backdrop-blur-xl border-t border-pink-50 flex px-4 py-3 z-50">
        <div class="nav-btn nav-active flex flex-col items-center justify-center flex-1 py-2" onclick="showPage('home', this)"><i class="fas fa-home text-lg"></i><span class="text-[9px] mt-1">首頁</span></div>
        <div class="nav-btn flex flex-col items-center justify-center flex-1 py-2" onclick="showPage('weight', this)"><i class="fas fa-weight text-lg"></i><span class="text-[9px] mt-1">體重</span></div>
        <div class="nav-btn flex flex-col items-center justify-center flex-1 py-2" onclick="showPage('exer', this)"><i class="fas fa-running text-lg"></i><span class="text-[9px] mt-1">運動</span></div>
        <div class="nav-btn flex flex-col items-center justify-center flex-1 py-2" onclick="showPage('water', this)"><i class="fas fa-tint text-lg"></i><span class="text-[9px] mt-1">喝水</span></div>
        <div class="nav-btn flex flex-col items-center justify-center flex-1 py-2" onclick="showPage('diet', this)"><i class="fas fa-utensils text-lg"></i><span class="text-[9px] mt-1">飲食</span></div>
        <div class="nav-btn flex flex-col items-center justify-center flex-1 py-2" onclick="showPage('sleep', this)"><i class="fas fa-moon text-lg"></i><span class="text-[9px] mt-1">睡眠</span></div>
    </nav>

    <script>
        // --- 內建資料庫 (妳不需要算，我幫妳算好一些常見的) ---
        const foodDB = [
            {n: "雞腿便當", c: 800}, {n: "雞胸肉", c: 165}, {n: "大份沙拉", c: 250}, {n: "珍珠奶茶", c: 650},
            {n: "拿鐵咖啡", c: 150}, {n: "御飯糰", c: 200}, {n: "茶葉蛋", c: 75}, {n: "義大利麵", c: 600},
            {n: "蘋果", c: 60}, {n: "香蕉", c: 90}, {n: "地瓜", c: 150}, {n: " Subway (6吋)", c: 350},
            {n: "火鍋 (清湯)", c: 500}, {n: "吐司 (一片)", c: 80}, {n: "水煮蛋", c: 70}
        ];

        const USER_HEIGHT = 171.6;
        const today = new Date().toLocaleDateString('zh-TW');
        let db = JSON.parse(localStorage.getItem('ziqing_v4_data')) || {};
        if (!db[today]) db[today] = { weight: 0, water: 0, exer: 0, food: [], totalFoodCal: 0, sleep: 7 };

        let weightChart;

        function showPage(p, btn) {
            document.querySelectorAll('.page').forEach(page => page.classList.remove('active'));
            document.getElementById('page-' + p).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('nav-active'));
            btn.classList.add('nav-active');
            
            const titles = { home: '🍬 今日總覽', weight: '⚖️ 體重趨勢', exer: '🏃‍♀️ 運動紀錄', water: '💧 喝水提醒', diet: '🍱 飲食熱量', sleep: '🌙 睡眠品質' };
            document.getElementById('headerTitle').innerText = titles[p];
            if(p === 'weight') initWChart();
            refreshUI();
        }

        // --- 食物搜尋邏輯 ---
        function searchFood() {
            const input = document.getElementById('foodInput').value;
            const list = document.getElementById('autocompleteList');
            list.innerHTML = "";
            if (!input) return;
            
            const filtered = foodDB.filter(f => f.n.includes(input));
            filtered.forEach(f => {
                const div = document.createElement("div");
                div.className = "autocomplete-item";
                div.innerHTML = `<strong>${f.n}</strong> - ${f.c} kcal`;
                div.onclick = () => {
                    document.getElementById('foodInput').value = f.n;
                    document.getElementById('foodCal').value = f.c;
                    list.innerHTML = "";
                };
                list.appendChild(div);
            });
        }

        function refreshUI() {
            const data = db[today];
            document.getElementById('dashWater').innerText = data.water;
            document.getElementById('waterText').innerText = data.water;
            document.getElementById('dashExer').innerText = data.exer;
            document.getElementById('dashSleep').innerText = data.sleep;
            document.getElementById('dashFood').innerText = data.totalFoodCal;
            document.getElementById('sleepVal').innerText = data.sleep;
            document.getElementById('sleepRange').value = data.sleep;

            // BMI & Dashboard
            if (data.weight > 0) {
                const bmi = (data.weight / ((USER_HEIGHT/100)**2)).toFixed(1);
                document.getElementById('dashBMI').innerText = bmi;
                document.getElementById('bmiStatus').innerText = bmi >= 24 ? "稍微肉肉的，加油！" : "體型超完美 ✨";
            }

            // 水杯渲染
            const grid = document.getElementById('waterGrid');
            grid.innerHTML = '';
            for(let i=0; i<8; i++) {
                grid.innerHTML += `<div class="w-full aspect-square bg-gray-50 rounded-xl flex items-center justify-center ${i < data.water ? 'text-blue-400 bg-blue-50' : 'text-gray-200'}">
                    <i class="fas fa-tint text-xl"></i>
                </div>`;
            }

            // 飲食清單
            const fl = document.getElementById('foodLogs');
            fl.innerHTML = data.food.map(f => `<div class="flex justify-between items-center bg-gray-50 p-3 rounded-xl">
                <span class="font-bold">${f.name}</span>
                <span class="text-pink-500 font-black">${f.cal} kcal</span>
            </div>`).join('');
        }

        function updateWeight() {
            const val = document.getElementById('wInput').value;
            if(val) { db[today].weight = parseFloat(val); saveDB(); initWChart(); alert("存好囉！"); }
        }

        function modifyWater(n) { db[today].water = Math.max(0, db[today].water + n); saveDB(); }

        function addExer() {
            const met = document.getElementById('exType').value;
            const time = document.getElementById('exTime').value;
            const weight = db[today].weight || 71;
            const burn = Math.round(met * weight * (time/60));
            db[today].exer += burn;
            saveDB();
            alert(`消耗了 ${burn} 大卡！妳太猛了 🔥`);
        }

        function addFood() {
            const n = document.getElementById('foodInput').value;
            const c = parseInt(document.getElementById('foodCal').value);
            if(n && c) {
                db[today].food.push({name: n, cal: c});
                db[today].totalFoodCal += c;
                saveDB();
                document.getElementById('foodInput').value = "";
                document.getElementById('foodCal').value = "";
            }
        }

        function saveSleep() {
            db[today].sleep = parseFloat(document.getElementById('sleepRange').value);
            saveDB();
            alert("睡眠紀錄已儲存 😴");
        }

        function saveDB() {
            localStorage.setItem('ziqing_v4_data', JSON.stringify(db));
            refreshUI();
        }

        function initWChart() {
            const ctx = document.getElementById('wChart').getContext('2d');
            if(weightChart) weightChart.destroy();
            const dates = Object.keys(db).sort().slice(-7);
            const weights = dates.map(d => db[d].weight > 0 ? db[d].weight : null);
            weightChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: dates.map(d => d.split('/')[2] + '日'),
                    datasets: [{
                        label: '體重 (kg)',
                        data: weights,
                        borderColor: '#ff4d6d',
                        backgroundColor: 'rgba(255, 77, 109, 0.2)',
                        fill: true, tension: 0.4, spanGaps: true
                    }]
                }
            });
        }

        document.getElementById('sleepRange').oninput = function() { document.getElementById('sleepVal').innerText = this.value; };
        document.getElementById('todayDisplay').innerText = today;
        refreshUI();
    </script>
</body>
</html>
